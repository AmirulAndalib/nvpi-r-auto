name: Feature Request
description: Suggest an improvement to the packaging or workflow
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        > **Note:** Feature requests for the apps themselves should go upstream:
        > - NVPI Revamped: [xHybred/NvidiaProfileInspectorRevamped](https://github.com/xHybred/NvidiaProfileInspectorRevamped/issues)
        > - NVIDIA Profile Inspector (Original): [Orbmu2k/nvidiaProfileInspector](https://github.com/Orbmu2k/nvidiaProfileInspector/issues)

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this useful?
