name: Bug Report
description: Report a packaging or installation issue
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        > **Note:** If the bug is in the app itself (not the packaging), report it upstream:
        > - NVPI Revamped: [xHybred/NvidiaProfileInspectorRevamped](https://github.com/xHybred/NvidiaProfileInspectorRevamped/issues)
        > - NVIDIA Profile Inspector (Original): [Orbmu2k/nvidiaProfileInspector](https://github.com/Orbmu2k/nvidiaProfileInspector/issues)

  - type: dropdown
    id: manager
    attributes:
      label: Package Manager
      options:
        - WinGet
        - Chocolatey
        - Scoop
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: "e.g. 7.0.1.0 (NVPI-R) or 3.0.1.10 (NPI)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run `winget install xHybred.NVPIRevamped` (or `winget install Orbmu2k.nvidiaProfileInspector`)
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant error messages or terminal output.
      render: text
